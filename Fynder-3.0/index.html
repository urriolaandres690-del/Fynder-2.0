<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fynder – Descubre Negocios Locales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Translate Element -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'es',
        includedLanguages: 'es,en,fr,pt,de,it,zh-CN,ja,ko,ar,ru',
        autoDisplay: false,
        multilanguagePage: false,
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <!-- Estilos globales -->
  <link rel="stylesheet" href="shared/fynder.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Leaflet para el mapa de negocios -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<!-- ── BARRA DE NAVEGACIÓN ── -->
<nav id="navbar">
  <div class="nav-inner">
    <button id="mainLogo" class="logo" onclick="goPage('home')">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
      </div>
      <span class="logo-text" id="logoText"><span class="fyn">FYN</span><span class="der">DER</span></span>
    </button>
    <div class="nav-right">
      <div class="nav-links">
        <button class="nav-link active" id="nl-home"      onclick="goPage('home')"      data-i18n="nav.home">Inicio</button>
        <button class="nav-link"        id="nl-directory" onclick="goPage('directory')" data-i18n="nav.directory">Directorio</button>
        <button class="nav-link"        id="nl-favorites" onclick="goPage('favorites')" data-i18n="nav.saved">Guardados<span class="nav-badge" id="navBadge" style="display:none">0</span></button>
        <button class="nav-link"        id="nl-messages"  onclick="goPage('messages')"  data-i18n="nav.messages">Mensajes<span class="nav-badge" id="navMsgBadge" style="display:none">0</span></button>
      </div>
      <div class="nav-actions">
        <span id="userName" class="nav-username"></span>
        <button class="nav-icon-btn" id="navBtnProfile"   onclick="goPage('profile')"   style="display:none" title="Mi perfil"><i class="fas fa-user-circle"></i></button>
        <button class="nav-icon-btn" id="navBtnDashboard" onclick="goPage('dashboard')" style="display:none" title="Mi panel"><i class="fas fa-chart-line"></i></button>
        <button class="btn-login-nav" id="navBtnLogin" onclick="goPage('login')">
          <i class="fas fa-right-to-bracket"></i>
          <span data-i18n="nav.login">Iniciar sesión</span>
        </button>
        <button class="btn-teal" onclick="goPage('business')">
          <i class="fas fa-plus" style="font-size:.75rem"></i>
          <span data-i18n="nav.register">Registrar negocio</span>
        </button>
        <button id="darkToggle" class="dark-toggle-btn" onclick="toggleDarkMode()" title="Cambiar tema">
          <span class="dark-toggle-icon">
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            <svg class="icon-sun"  xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          </span>
        </button>
        <button class="nav-dots-btn" id="navHamburger" onclick="toggleMobileMenu()" aria-label="Más opciones" title="Más opciones">
          <i class="fas fa-ellipsis-vertical nav-icon-desktop"></i>
          <i class="fas fa-bars nav-icon-mobile"></i>
        </button>
        <button class="nav-settings-btn" id="navSettingsBtn" onclick="goPage('settings')" title="Ajustes"><i class="fas fa-gear"></i></button>
      </div>
    </div>
  </div>
</nav>

<!-- ── MENÚ MÓVIL ── -->
<div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="closeMobileMenu()"></div>
<div class="mobile-menu-drawer" id="mobileMenuDrawer">
  <div class="mobile-menu-header">
    <button class="logo mobile-menu-logo" onclick="closeMobileMenu();goPage('home')">
      <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></div>
      <span class="logo-text"><span class="fyn">FYN</span><span class="der">DER</span></span>
    </button>
    <button class="mobile-menu-close" onclick="closeMobileMenu()"><i class="fas fa-times"></i></button>
  </div>
  <nav class="mobile-menu-nav">
    <button onclick="closeMobileMenu();goPage('home')"><i class="fas fa-house"></i> Inicio</button>
    <button onclick="closeMobileMenu();goPage('directory')"><i class="fas fa-compass"></i> Directorio</button>
    <button onclick="closeMobileMenu();goPage('favorites')"><i class="fas fa-heart"></i> Guardados</button>
    <button onclick="closeMobileMenu();goPage('messages')"><i class="fas fa-comment-dots"></i> Mensajes</button>
    <button onclick="closeMobileMenu();goPage('plans')"><i class="fas fa-gem"></i> Planes</button>
    <button onclick="closeMobileMenu();goPage('about')"><i class="fas fa-circle-info"></i> Sobre Fynder</button>
    <button onclick="closeMobileMenu();goPage('fynder')"><i class="fas fa-bolt"></i> Saber más</button>
    <button class="mobile-menu-tool-item mobile-menu-has-sub" onclick="toggleMobileSubMenu('sub-blog',this)">
      <i class="fas fa-newspaper"></i><span>Blog</span>
      <i class="fas fa-chevron-right mobile-sub-arrow" id="arrow-sub-blog"></i>
    </button>
    <div class="mobile-submenu" id="sub-blog">
      <button onclick="closeMobileMenu();goPage('blog')"><i class="fas fa-bell"></i> Novedades</button>
      <button onclick="closeMobileMenu();openFeedbackModal()"><i class="fas fa-bullhorn"></i> Dar tu opinión</button>
    </div>
    <button onclick="closeMobileMenu();goPage('support')"><i class="fas fa-headset"></i> Soporte</button>
    <button onclick="closeMobileMenu();goPage('map')"><i class="fas fa-map-location-dot"></i> Mapa de negocios</button>
    <div class="mobile-menu-divider"></div>
    <button class="mobile-menu-tool-item mobile-menu-has-sub" onclick="toggleMobileSubMenu('sub-ayuda',this)">
      <i class="fas fa-circle-question"></i><span>Ayuda</span>
      <i class="fas fa-chevron-right mobile-sub-arrow" id="arrow-sub-ayuda"></i>
    </button>
    <div class="mobile-submenu" id="sub-ayuda">
      <button onclick="closeMobileMenu();goPage('support')"><i class="fas fa-headset"></i> Centro de soporte</button>
      <button onclick="closeMobileMenu();goPage('about')"><i class="fas fa-circle-info"></i> Sobre Fynder</button>
      <button onclick="closeMobileMenu();goPage('terms')"><i class="fas fa-file-lines"></i> Términos de servicio</button>
      <button onclick="closeMobileMenu();goPage('privacy')"><i class="fas fa-shield-halved"></i> Política de privacidad</button>
    </div>
    <button class="mobile-menu-tool-item" onclick="closeMobileMenu();goPage('settings')">
      <i class="fas fa-gear"></i><span>Configuración</span>
    </button>
    <button class="mobile-menu-tool-item mobile-menu-tool-danger" id="mobileMenuSalirBtn" onclick="closeMobileMenu();logout()">
      <i class="fas fa-right-from-bracket"></i><span>Salir</span>
    </button>
    <div class="mobile-menu-divider"></div>
    <div class="mobile-menu-org-footer">
      <i class="fas fa-building-columns"></i>
      <span>Gestionado por tu organización</span>
    </div>
  </nav>
  <div class="mobile-menu-actions" id="mobileMenuActions"><!-- rellenado por JS --></div>
</div>

<!-- ── MODAL: DETALLE NEGOCIO ── -->
<div class="fynder-modal-overlay hide" id="modalOverlay" onclick="closeModal(event)">
  <div class="fynder-modal" id="modal">
    <div class="modal-img">
      <img id="modalImg" src="" alt="" onerror="this.style.opacity='.3'" />
      <div class="modal-img-overlay"></div>
      <button class="modal-close" onclick="closeModalDirect()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
      <div class="modal-header-info">
        <div class="modal-logo"><img id="modalLogo" src="" alt="" /></div>
        <div>
          <div class="modal-name" id="modalName"></div>
          <div class="modal-meta"><span class="modal-cat" id="modalCat"></span><span style="color:rgba(255,255,255,.4)">·</span><div id="modalStars" class="stars"></div><span id="modalRating" style="color:#fff;font-weight:700;font-size:.875rem"></span><span id="modalReviews" style="color:rgba(255,255,255,.6);font-size:.75rem"></span></div>
        </div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-actions">
        <button class="btn-sm btn-fav" id="modalFavBtn" onclick="toggleModalFav()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg><span id="modalFavLabel">Guardar</span></button>
        <button class="btn-sm btn-share" id="modalShareBtn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>Compartir</button>
        <button class="btn-sm btn-contact" id="modalContactBtn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12 19.79 19.79 0 0 1 1.93 3.38 2 2 0 0 1 3.91 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Contactar</button>
        <button class="btn-sm btn-msg-biz" id="modalMsgBtn" onclick="openChatFromModal()"><i class="fas fa-comment-dots"></i>Mensajear</button>
      </div>
      <div class="modal-tags" id="modalTags"></div>
      <div><p class="modal-section-title">Sobre el negocio</p><p class="modal-desc" id="modalDesc"></p></div>
      <div><p class="modal-section-title">Información</p><div class="info-grid" id="modalInfo"></div></div>
      <div id="modalSocialWrap"><p class="modal-section-title">Redes Sociales</p><div class="social-btns" id="modalSocial"></div></div>
      <div id="modalReviewsWrap"></div>
      <div><p class="modal-section-title">Ubicación</p><div id="modalMapWrap" class="modal-map-wrap"></div></div>
      <button class="btn-map" style="display:none"></button>
    </div>
  </div>
</div>

<!-- ── MODAL: CÁMARA ── -->
<div id="cameraModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);align-items:center;justify-content:center;flex-direction:column;gap:16px">
  <p style="color:#fff;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:600;text-align:center;margin:0">Toma tu foto</p>
  <div style="position:relative;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6)">
    <video id="cameraVideo" autoplay playsinline style="display:block;width:min(480px,90vw);aspect-ratio:4/3;object-fit:cover;background:#000"></video>
    <canvas id="cameraCanvas" style="display:none"></canvas>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button id="cameraCaptureBtn" onclick="cameraSnap()" style="padding:13px 32px;border-radius:99px;border:none;background:#67B8B4;color:#fff;font-family:'Poppins',sans-serif;font-size:.9375rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px">
      <i class="fas fa-camera"></i> Tomar foto
    </button>
    <button onclick="cameraClose()" style="padding:13px 24px;border-radius:99px;border:1px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.8);font-family:'Inter',sans-serif;font-size:.875rem;cursor:pointer">Cancelar</button>
  </div>
</div>

<!-- ── MODAL: ESTADÍSTICAS ── -->
<div class="smodal-overlay hide" id="statModalOverlay" onclick="closeStatModal()"></div>

<!-- ── MENÚ CONTEXTUAL: LISTA DE MENSAJES ── -->
<div class="msg-ctx-overlay" id="msgCtxOverlay" onclick="closeMsgCtxMenu()"></div>
<div class="msg-ctx-menu" id="msgCtxMenu">
  <div class="msg-ctx-header" id="msgCtxHeader">
    <div class="msg-ctx-ava" id="msgCtxAva"></div>
    <span class="msg-ctx-name" id="msgCtxName"></span>
  </div>
  <button class="msg-ctx-item" id="msgCtxBookmark" onclick="toggleMsgBookmark()">
    <i class="fas fa-bookmark" id="msgCtxBookmarkIcon"></i>
    <span id="msgCtxBookmarkLabel">Añadir a favoritos</span>
  </button>
  <button class="msg-ctx-item" onclick="msgCtxOpenChat()"><i class="fas fa-comment-dots"></i><span>Abrir chat</span></button>
  <button class="msg-ctx-item" onclick="msgCtxViewProfile()"><i class="fas fa-circle-info"></i><span>Ver información</span></button>
  <button class="msg-ctx-item" onclick="msgCtxMarkRead()"><i class="fas fa-check-double"></i><span>Marcar como leído</span></button>
  <div class="msg-ctx-divider"></div>
  <button class="msg-ctx-item msg-ctx-item-danger" onclick="msgCtxDeleteChat()"><i class="fas fa-trash-can"></i><span>Borrar conversación</span></button>
</div>

<!-- ── EMOJI PICKER ── -->
<div class="emoji-overlay" id="emojiOverlay" onclick="closeEmojiPicker()"></div>
<div class="emoji-picker" id="emojiPicker">
  <div class="emoji-picker-tabs" id="emojiPickerTabs"></div>
  <div class="emoji-picker-search">
    <input type="text" id="emojiSearch" placeholder="Buscar emoji..." oninput="filterEmojis()" autocomplete="off">
  </div>
  <div class="emoji-picker-grid" id="emojiGrid"></div>
</div>
