<div id="page-write" class="page page-inner">
  <div class="write-inner">

    <div class="write-topbar">
      <button class="back-page-btn" onclick="goPage('blog')"><i class="fas fa-arrow-left"></i> Volver al Blog</button>
      <div class="write-topbar-actions">
        <button class="write-btn-preview" id="writeBtnPreview" onclick="toggleWritePreview()">
          <i class="fas fa-eye"></i> Previsualizar
        </button>
        <button class="write-btn-publish" onclick="publishArticle()">
          <i class="fas fa-paper-plane"></i> Publicar
        </button>
      </div>
    </div>

    <!-- Editor / Preview toggle -->
    <div class="write-layout" id="writeLayout">

      <!-- EDITOR PANEL -->
      <div class="write-editor-panel" id="writeEditorPanel">

        <!-- Portada -->
        <div class="write-section write-cover-section">
          <div class="write-cover-preview" id="writeCoverPreview">
            <div class="write-cover-placeholder" id="writeCoverPlaceholder">
              <i class="fas fa-image"></i>
              <span>Sin imagen de portada</span>
            </div>
            <img id="writeCoverImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:16px">
            <button class="write-cover-remove" id="writeCoverRemove" onclick="removeCoverImage()" style="display:none" title="Quitar imagen">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="write-cover-url-row">
            <div class="write-input-wrap" style="flex:1">
              <i class="fas fa-link write-input-icon"></i>
              <input type="url" id="writeCoverUrl" placeholder="URL de imagen de portada (pega el enlace aquí)" oninput="updateCoverPreview(this.value)">
            </div>
          </div>
        </div>

        <!-- Meta info -->
        <div class="write-section">
          <div class="write-meta-row">
            <div class="write-field" style="flex:2">
              <label class="write-label">Categoría</label>
              <div class="write-select-wrap">
                <select id="writeCategory" class="write-select">
                  <option value="Emprendimiento">🚀 Emprendimiento</option>
                  <option value="Comunidad">🤝 Comunidad</option>
                  <option value="Gastronomía">🍽️ Gastronomía</option>
                  <option value="Tecnología">💻 Tecnología</option>
                  <option value="Estilo de vida">✨ Estilo de vida</option>
                  <option value="Consejos">💡 Consejos</option>
                  <option value="Negocios">📊 Negocios</option>
                  <option value="Turismo">🗺️ Turismo</option>
                </select>
              </div>
            </div>
            <div class="write-field" style="flex:3">
              <label class="write-label">Tiempo de lectura estimado</label>
              <div class="write-input-wrap">
                <i class="fas fa-clock write-input-icon"></i>
                <input type="text" id="writeReadTime" placeholder="Ej: 5 min" value="3 min">
              </div>
            </div>
          </div>
        </div>

        <!-- Título -->
        <div class="write-section">
          <textarea id="writeTitle" class="write-title-input" placeholder="Escribe el título de tu artículo..." maxlength="120" rows="2" oninput="autoResizeTextarea(this);updateWriteCharCount('writeTitle','writeTitleCount',120)"></textarea>
          <div class="write-char-count"><span id="writeTitleCount">0</span>/120</div>
        </div>

        <!-- Barra de herramientas del editor -->
        <div class="write-section">
          <div class="write-toolbar" id="writeToolbar">
            <div class="write-toolbar-group">
              <button class="write-tool-btn" onclick="writeFormat('bold')" title="Negrita (Ctrl+B)"><i class="fas fa-bold"></i></button>
              <button class="write-tool-btn" onclick="writeFormat('italic')" title="Cursiva (Ctrl+I)"><i class="fas fa-italic"></i></button>
              <button class="write-tool-btn" onclick="writeFormat('underline')" title="Subrayado"><i class="fas fa-underline"></i></button>
            </div>
            <div class="write-toolbar-sep"></div>
            <div class="write-toolbar-group">
              <button class="write-tool-btn" onclick="writeInsert('h2')" title="Título de sección"><i class="fas fa-heading"></i></button>
              <button class="write-tool-btn" onclick="writeInsert('h3')" title="Subtítulo"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h8M4 12h8M4 18h8M15 9l3-3v12"/></svg></button>
            </div>
            <div class="write-toolbar-sep"></div>
            <div class="write-toolbar-group">
              <button class="write-tool-btn" onclick="writeInsert('ul')" title="Lista"><i class="fas fa-list-ul"></i></button>
              <button class="write-tool-btn" onclick="writeInsert('ol')" title="Lista numerada"><i class="fas fa-list-ol"></i></button>
              <button class="write-tool-btn" onclick="writeInsert('quote')" title="Cita"><i class="fas fa-quote-left"></i></button>
              <button class="write-tool-btn" onclick="writeInsert('hr')" title="Separador"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/></svg></button>
            </div>
            <div class="write-toolbar-sep"></div>
            <div class="write-toolbar-group">
              <button class="write-tool-btn" onclick="writeInsert('link')" title="Enlace"><i class="fas fa-link"></i></button>
              <button class="write-tool-btn" onclick="writeInsert('highlight')" title="Destacar texto"><i class="fas fa-highlighter"></i></button>
            </div>
            <div class="write-toolbar-sep"></div>
            <button class="write-tool-btn write-tool-clear" onclick="clearWriteEditor()" title="Limpiar todo"><i class="fas fa-trash-can"></i></button>
          </div>

          <div id="writeEditor" class="write-editor" contenteditable="true"
               data-placeholder="Empieza a escribir tu artículo aquí. Usa la barra de herramientas para dar formato al texto..."
               oninput="onWriteEditorInput()"
               onkeydown="handleWriteEditorKey(event)">
          </div>
          <div class="write-editor-footer">
            <span class="write-word-count" id="writeWordCount">0 palabras</span>
            <span class="write-char-count-inline" id="writeEditorCharCount">0 caracteres</span>
          </div>
        </div>

        <!-- Autor -->
        <div class="write-section">
          <label class="write-label">Tu nombre (aparecerá como autor)</label>
          <div class="write-input-wrap">
            <i class="fas fa-user write-input-icon"></i>
            <input type="text" id="writeAuthor" placeholder="Nombre del autor">
          </div>
        </div>

      </div><!-- /write-editor-panel -->

      <!-- PREVIEW PANEL -->
      <div class="write-preview-panel" id="writePreviewPanel" style="display:none">
        <div class="write-preview-badge"><i class="fas fa-eye"></i> Previsualización</div>

        <div class="write-preview-hero" id="previewHero" style="display:none">
          <img id="previewHeroImg" src="" alt="" class="write-preview-hero-img">
          <div class="write-preview-hero-overlay"></div>
        </div>

        <div class="write-preview-body">
          <span class="blog-cat-label" id="previewCategory" style="color:#67B8B4"></span>
          <h1 class="write-preview-title" id="previewTitle">Tu título aparecerá aquí</h1>
          <div class="write-preview-meta">
            <div class="blog-author">
              <div class="blog-author-av" id="previewAuthorAv" style="background:linear-gradient(135deg,#67B8B4,#2F5BB7)">?</div>
              <span id="previewAuthorName">Autor</span>
            </div>
            <span class="blog-date"><i class="fas fa-calendar-alt"></i> <span id="previewDate"></span></span>
            <span class="blog-read"><i class="fas fa-clock"></i> <span id="previewReadTime">3 min</span></span>
          </div>
          <div class="article-content" id="previewBody"></div>
        </div>
      </div><!-- /write-preview-panel -->

    </div><!-- /write-layout -->
  </div><!-- /write-inner -->
</div>
