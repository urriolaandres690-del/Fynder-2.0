<div id="page-chat" class="page chat-page chat-mobile-only">

  <!-- Header del chat -->
  <div class="chat-header">
    <button class="chat-back-btn" onclick="goPage('messages')">
      <i class="fas fa-arrow-left"></i>
    </button>
    <div class="chat-header-ava-wrap" onclick="openChatProfile()">
      <div class="chat-header-avatar" id="chatHeaderAvatarMobile"></div>
      <span class="chat-header-online" id="chatHeaderOnlineMobile"></span>
    </div>
    <div class="chat-header-info" onclick="openChatProfile()" style="cursor:pointer">
      <span class="chat-header-name" id="chatHeaderNameMobile">—</span>
      <span class="chat-header-sub" id="chatHeaderSubMobile">Negocio local</span>
    </div>
    <div style="display:flex;gap:4px">
      <button class="chat-icon-btn" onclick="showToast('Llamada próximamente')" title="Llamar">
        <i class="fas fa-phone"></i>
      </button>
      <button class="chat-icon-btn" onclick="openChatProfile()" title="Ver perfil">
        <i class="fas fa-ellipsis-vertical"></i>
      </button>
    </div>
  </div>

  <!-- Mensajes -->
  <div class="chat-messages" id="chatMessagesMobile"></div>

  <!-- Input de mensaje -->
  <div class="chat-input-bar">
    <button class="chat-emoji-btn" id="chatEmojiBtnMobile" onclick="toggleEmojiPickerMobile()">
      <i class="fas fa-face-smile"></i>
    </button>
    <input type="text" id="chatInputMobile" class="chat-input"
      placeholder="Escribe un mensaje..."
      onkeydown="if(event.key==='Enter')sendChatMessageMobile()"
      autocomplete="off" />
    <button class="chat-send-btn" onclick="sendChatMessageMobile()">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
</div>
