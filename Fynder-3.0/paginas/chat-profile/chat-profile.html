<div id="page-chat-profile" class="page chat-profile-page">

  <!-- Header -->
  <div class="cpro-header">
    <button class="chat-back-btn" onclick="cproGoBack()" title="Volver">
      <i class="fas fa-arrow-left"></i>
    </button>
    <span class="cpro-header-title" id="cproHeaderTitle">Información</span>
    <button class="chat-icon-btn" onclick="toggleCproMenu(this)" title="Más opciones" id="cproMenuBtn">
      <i class="fas fa-ellipsis-vertical"></i>
    </button>
  </div>

  <!-- Menú contextual del header de perfil -->
  <div class="wa-chat-ctx-menu cpro-ctx-menu" id="cproCtxMenu" style="display:none">
    <button onclick="cproShareProfile();closeCproMenu()"><i class="fas fa-share-nodes"></i> Compartir perfil</button>
    <button onclick="openModal(_activeChatBizId);closeCproMenu()"><i class="fas fa-store"></i> Ver ficha del negocio</button>
    <button onclick="toggleFav(_activeChatBizId);closeCproMenu()"><i class="fas fa-heart"></i> Guardar en favoritos</button>
    <div class="wa-ctx-divider"></div>
    <button onclick="deleteChatHistory();closeCproMenu()" style="color:#ef4444"><i class="fas fa-trash-can"></i> Borrar historial</button>
    <button onclick="blockBiz();closeCproMenu()" style="color:#ef4444"><i class="fas fa-ban"></i> Bloquear negocio</button>
  </div>

  <!-- Scroll body -->
  <div class="cpro-body">

    <!-- Hero: avatar grande + nombre + teléfono -->
    <div class="cpro-hero">
      <div class="cpro-avatar" id="cproAvatar"></div>
      <h2 class="cpro-name"  id="cproName">—</h2>
      <p  class="cpro-phone" id="cproPhone"></p>
    </div>

    <!-- Acciones: Llamar / Ver mapa / Buscar -->
    <div class="cpro-actions">
      <button class="cpro-action-btn" id="cproCallBtn" onclick="cproCall()">
        <div class="cpro-action-icon"><i class="fas fa-phone"></i></div>
        <span>Llamar</span>
      </button>
      <button class="cpro-action-btn" onclick="openChatProfileMap()">
        <div class="cpro-action-icon"><i class="fas fa-map-location-dot"></i></div>
        <span>Ver mapa</span>
      </button>
      <button class="cpro-action-btn" onclick="cproSearchInChat()">
        <div class="cpro-action-icon"><i class="fas fa-magnifying-glass"></i></div>
        <span>Buscar</span>
      </button>
    </div>

    <!-- Fotos (logo + imagen del negocio) -->
    <div class="cpro-section">
      <div class="cpro-section-header">
        <span class="cpro-section-label">Archivos y fotos</span>
        <span class="cpro-section-count" id="cproMediaCount" onclick="openPhotoLightbox()" style="cursor:pointer">2 &rsaquo;</span>
      </div>
      <div class="cpro-media-strip" id="cproMediaStrip">
        <!-- Rellenado por JS -->
      </div>
    </div>

    <!-- Info del negocio: settings-list estilo WhatsApp -->
    <div class="cpro-settings-list" id="cproInfoList">
      <!-- Rellenado por JS -->
    </div>

    <!-- Acciones de chat -->
    <div class="cpro-settings-list cpro-danger-section">
      <div class="cpro-settings-item" onclick="openModal(_activeChatBizId)" style="cursor:pointer">
        <div class="cpro-settings-icon"><i class="fas fa-store"></i></div>
        <div class="cpro-settings-text">
          <span class="cpro-settings-title">Ver ficha del negocio</span>
          <span class="cpro-settings-sub">Reseñas, horarios y más</span>
        </div>
        <i class="fas fa-chevron-right cpro-settings-arrow"></i>
      </div>
      <div class="cpro-settings-item" onclick="cproWhatsApp()" style="cursor:pointer">
        <div class="cpro-settings-icon" style="background:rgba(37,211,102,.15)"><i class="fab fa-whatsapp" style="color:#25d366"></i></div>
        <div class="cpro-settings-text">
          <span class="cpro-settings-title">Contactar por WhatsApp</span>
        </div>
        <i class="fas fa-chevron-right cpro-settings-arrow"></i>
      </div>
      <div class="cpro-settings-item cpro-settings-item-danger" onclick="deleteChatHistory()">
        <div class="cpro-settings-icon cpro-icon-danger"><i class="fas fa-trash-can"></i></div>
        <div class="cpro-settings-text">
          <span class="cpro-settings-title cpro-danger-txt">Borrar historial</span>
        </div>
      </div>
      <div class="cpro-settings-item cpro-settings-item-danger" onclick="blockBiz()">
        <div class="cpro-settings-icon cpro-icon-danger"><i class="fas fa-ban"></i></div>
        <div class="cpro-settings-text">
          <span class="cpro-settings-title cpro-danger-txt">Bloquear negocio</span>
        </div>
      </div>
    </div>

  </div>
</div>
