<!-- ── PÁGINAS Y MODALES ── -->
<div id="pages-container"></div>

<script>
(function() {
  var pages = [
    'paginas/home/home.html',
    'paginas/directorio/directorio.html',
    'paginas/mapa/mapa.html',
    'paginas/guardados/guardados.html',
    'paginas/login/login.html',
    'paginas/registro/registro.html',
    'paginas/negocio/negocio.html',
    'paginas/perfil/perfil.html',
    'paginas/saber-mas/saber-mas.html',
    'paginas/sobre-fynder/sobre-fynder.html',
    'paginas/blog/blog.html',
    'paginas/write/write.html',
    'paginas/terminos/terminos.html',
    'paginas/privacidad/privacidad.html',
    'paginas/planes/planes.html',
    'paginas/dashboard/dashboard.html',
    'paginas/soporte/soporte.html',
    'paginas/articulo/articulo.html',
    'paginas/mensajes/mensajes.html',
    'paginas/chat/chat.html',
    'paginas/chat-profile/chat-profile.html',
    'paginas/ajustes/ajustes.html',
    'paginas/bienvenida-modal/bienvenida-modal.html',
    'compartido/modal-business-detail.html',
    'compartido/modal-camera.html',
    'compartido/modal-feedback.html',
    'compartido/modal-org-info.html',
    'compartido/modal-stats.html'
  ];
  var container = document.getElementById('pages-container');
  pages.forEach(function(url) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, false); // síncrono
    try {
      xhr.send(null);
      if (xhr.status === 200 || xhr.status === 0) {
        var tmp = document.createElement('div');
        tmp.innerHTML = xhr.responseText;
        while (tmp.firstChild) container.appendChild(tmp.firstChild);
      }
    } catch(e) {
      console.warn('No se pudo cargar ' + url, e);
    }
  });
})();
</script>
