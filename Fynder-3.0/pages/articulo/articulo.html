<div id="page-article" class="page" style="min-height:100vh;background:var(--bg);padding-bottom:0">
  <div class="article-hero">
    <img id="artHeroImg" src="" alt="" class="article-hero-img" />
    <div class="article-hero-overlay"></div>
    <button class="back-legal-btn article-back-btn" onclick="goPage('blog')">
      <i class="fas fa-arrow-left"></i> Volver al Blog
    </button>
  </div>
  <div class="article-body-wrap">
    <div class="article-meta-bar">
      <span class="blog-cat-label" id="artCatLabel"></span>
      <div class="blog-author">
        <div class="blog-author-av" id="artAuthorAv"></div>
        <span id="artAuthorName"></span>
      </div>
      <span class="blog-date"><i class="fas fa-calendar-alt"></i> <span id="artDate"></span></span>
      <span class="blog-read"><i class="fas fa-clock"></i> <span id="artReadTime"></span></span>
    </div>
    <h1 class="article-title" id="artTitle"></h1>
    <div class="article-content" id="artBody"></div>
    <div class="article-footer-actions">
      <button class="legal-action-btn legal-action-btn-primary" onclick="goPage('blog')">
        <i class="fas fa-arrow-left"></i> Volver al Blog
      </button>
      <button class="legal-action-btn" onclick="goPage('directory')">
        <i class="fas fa-store"></i> Ver negocios
      </button>
    </div>
  </div>

  <!-- Sección de comentarios -->
  <div class="article-comments-section">
    <h2 class="article-comments-title">
      Comentarios <span id="artCommentCount">0</span>
    </h2>

    <!-- Formulario -->
    <div class="article-comment-form">
      <h3><i class="fas fa-comment-dots" style="color:var(--primary);margin-right:8px"></i>Deja tu comentario</h3>
      <textarea id="artCommentText" placeholder="¿Qué piensas sobre este artículo?" maxlength="500" oninput="artCommentCharCount(this)"></textarea>
      <div class="article-comment-form-footer">
        <span class="article-comment-chars" id="artCommentChars">0 / 500</span>
        <button class="article-comment-submit" onclick="submitArticleComment()">
          <i class="fas fa-paper-plane"></i> Comentar
        </button>
      </div>
    </div>

    <!-- Lista de comentarios -->
    <div class="article-comment-list" id="artCommentList"></div>
  </div>
</div>
